name: Continuous Integration

on:
  pull_request:
    branches:
      - master
      - main
      - develop

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: securityCheck
        run: |
          pnpm run securityCheck
          echo "✅ **securityCheck** — no known vulnerabilities" >> $GITHUB_STEP_SUMMARY

      - name: eslintCheck
        run: |
          pnpm run eslintCheck
          echo "✅ **eslintCheck** — no lint errors" >> $GITHUB_STEP_SUMMARY

      - name: prettierCheck
        run: |
          pnpm run prettierCheck
          echo "✅ **prettierCheck** — all files formatted" >> $GITHUB_STEP_SUMMARY

      - name: test:dynamic
        timeout-minutes: 15
        run: |
          pnpm run test:dynamic
          echo "✅ **test:dynamic** — all tests passed" >> $GITHUB_STEP_SUMMARY

      - name: build:api-docs
        run: |
          pnpm run build:api-docs
          echo "✅ **build:api-docs** — OpenAPI artifact generated" >> $GITHUB_STEP_SUMMARY

      - name: build:app
        run: |
          pnpm run build:app
          echo "✅ **build:app** — compilation successful" >> $GITHUB_STEP_SUMMARY
