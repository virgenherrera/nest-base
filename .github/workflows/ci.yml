name: Continuous Integration

on:
  pull_request:
    branches:
      - master
      - main
      - develop

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: test:static
        run: |
          pnpm run test:static
          echo "✅ **test:static** — security, lint, and format checks passed" >> $GITHUB_STEP_SUMMARY

      - name: test:dynamic
        timeout-minutes: 15
        run: |
          pnpm run test:dynamic
          echo "✅ **test:dynamic** — all tests passed" >> $GITHUB_STEP_SUMMARY

      - name: build
        run: |
          pnpm run build
          echo "✅ **build** — api-docs and app compilation successful" >> $GITHUB_STEP_SUMMARY
