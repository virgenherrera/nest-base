name: "Setup Node.js & pnpm"
description: "Composite action that installs pnpm, Node.js, and project dependencies. Extracted to avoid duplicating these three steps across ci.yml and bump-dependencies.yml."

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: "package.json"
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
